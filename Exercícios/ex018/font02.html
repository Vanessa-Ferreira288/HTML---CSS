<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Girl';
            src: url('font/Filxgirl.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        /* 
            Tipos de format()
            - oppentype (utf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced typografhy)
            - svg
        */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Girl', Times, serif;
            font-size: 4em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Hic voluptatum, culpa necessitatibus, numquam laborum quasi nobis maiores eligendi itaque quod nemo corrupti ipsam molestias, expedita ullam inventore harum rerum sint.</p>
</body>
</html>
