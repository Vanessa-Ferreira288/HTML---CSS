<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Esta imagem é flexível! Tente abri-la em vários dispositivos diferentes ou aumente o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/imagem-P.png" width="300" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/imagem-M.png" width="700" type="image/png">
        <img src="imagens/imagem-G.jpg" alt="Uma mulher na natureza" width="1050">
    </picture>

</body>
</html>
