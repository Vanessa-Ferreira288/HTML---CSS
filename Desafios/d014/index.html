<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Notas</title>
</head>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f4f4;
    }
    table {
        border-collapse: collapse;
        width: 500px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    /* Cabeçalho */
    thead th {
        background-color: #5a5a5a;
        color: white;
        padding: 10px;
        border: 1px solid #333;
    }
    /* Subcabeçalho */
    .subheader th {
        background-color: #6b6b6b;
        color: white;
    }
    /* Corpo */
    td, th {
        border: 1px solid #333;
        padding: 8px;
    }
    /* Coluna área */
    .area {
        font-weight: bold;
        background-color: #d9d9d9;
        text-align: center;
    }
    /* Linhas médias */
    .media-linha {
        background-color: #6b6b6b;
        color: white;
        font-weight: bold;
    }
    /* Disciplinas alinhadas à esquerda */
    .disciplina {
        text-align: left;
        padding-left: 10px;
    }
    </style>
    </head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr class="subheader">
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>

        <tbody>
            <!-- Exatas -->
            <tr>
                <td class="area" rowspan="4" scope="rowgroup">Exatas</td>
                <td class="disciplina">Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr class="media-linha">
                <td colspan="4" scope="row">Média de Exatas</td>
                <td>0.0</td>
            </tr>

            <!-- Humanas -->
            <tr>
                <td class="area" rowspan="2" scope="rowgroup">Humanas</td>
                <td class="disciplina">História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr class="media-linha">
                <td colspan="4" scope="row">Média de Humanas</td>
                <td>0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
